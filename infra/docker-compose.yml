services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: videogen
      POSTGRES_PASSWORD: videogen
      POSTGRES_DB: videogen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://videogen:videogen@postgres:5432/videogen
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-changeme}
      S3_BUCKET: videogen
      S3_REGION: us-east-1
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      FLOW_BASE_URL: http://localhost:8080
      LLM_BASE_URL: https://api.openai.com/v1
      LLM_MODEL: gpt-4o-mini
      LLM_API_KEY: ${LLM_API_KEY:-}
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "8000:8000"

  worker:
    build:
      context: ../apps/worker
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://videogen:videogen@postgres:5432/videogen
      ENQUEUE_SERVER_PORT: 3001
      WORKER_CONCURRENCY: "4"
      FLOW_BASE_URL: http://localhost:8080
      FLOW_API_KEY: ${FLOW_API_KEY:-changeme}
      LLM_BASE_URL: https://api.openai.com/v1
      LLM_MODEL: gpt-4o-mini
      LLM_API_KEY: ${LLM_API_KEY:-}
    depends_on:
      - postgres
      - redis
    ports:
      - "3001:3001"

  renderer:
    build:
      context: ../apps/renderer
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://videogen:videogen@postgres:5432/videogen
      RENDER_CONCURRENCY: "1"
      S3_BUCKET: videogen
      S3_REGION: us-east-1
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
    depends_on:
      - postgres
      - redis
      - minio

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:


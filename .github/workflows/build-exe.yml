name: Build Windows EXE (Launcher)

on:
  workflow_dispatch:

jobs:
  build_launcher_exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug paths
        run: |
          cd
          dir

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build project (auto-detect)
        run: |
          for /r %i in (*.csproj) do (
            echo Building %i
            dotnet restore "%i"
            dotnet publish "%i" -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true
          )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: launcher-exe
          path: '**/publish/'
